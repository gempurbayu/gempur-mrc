name: Docker CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: gempur_mrc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_user -d gempur_mrc_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/gempur_mrc_test
      TYPEORM_SYNC: "false"
      API_PORT: 3000
      WEB_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: npm run build

      - name: Run API unit tests
        run: npm test -w @tavily-research/api -- --runInBand

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile -t gempur-mrc-api:ci .

      - name: Build web Docker image
        run: docker build -f apps/web/Dockerfile -t gempur-mrc-web:ci .

      - name: Validate compose config
        run: docker compose config
