name: Docker CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: gempur_mrc_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci_user -d gempur_mrc_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/gempur_mrc_test
      TYPEORM_SYNC: "false"
      API_PORT: 3000
      WEB_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build and test API Docker image
        run: docker build --target test -f apps/api/Dockerfile -t gempur-mrc-api:test .

      - name: Build API Docker image
        run: docker build -f apps/api/Dockerfile -t gempur-mrc-api:ci .

      - name: Build web Docker image
        run: docker build -f apps/web/Dockerfile -t gempur-mrc-web:ci .

      - name: Validate compose config
        run: docker compose config
